# ============================================================
# Elastic 프로젝트 Spring Boot 설정
# ============================================================

spring:
  application:
    name: Elastic

  # ----------------------------------------------------------
  # MySQL 데이터소스 설정
  # ----------------------------------------------------------
  datasource:
    url: jdbc:mysql://localhost:3306/elastic_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: elastic
    password: elastic123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # ----------------------------------------------------------
  # JPA / Hibernate 설정
  # ----------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true

  # ----------------------------------------------------------
  # Redis 설정
  # ----------------------------------------------------------
  data:
    redis:
      host: localhost
      port: 6379
    elasticsearch:
      repositories:
        enabled: true

  # ----------------------------------------------------------
  # Elasticsearch 설정
  # ----------------------------------------------------------
  elasticsearch:
    uris: http://localhost:9200

  # ----------------------------------------------------------
  # Kafka 설정
  # ----------------------------------------------------------
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: elastic-sync-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.template.elastic.*

# ============================================================
# 로깅 설정
# ============================================================
logging:
  level:
    com.template.elastic: DEBUG
    org.springframework.data.elasticsearch: DEBUG

# ============================================================
# 서버 설정 (포트 8090 – Kafka UI와 충돌 방지)
# ============================================================
server:
  port: 8090
